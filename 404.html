<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <meta name="description" content="This page could not be found. You will be redirected to the Gonzalo Graham portfolio home page.">
  <title>Page not found — Gonzalo Graham</title>
  <script>
(function () {
  var path = (location.pathname || "/").replace(/\/+$/, "") || "/";
  if (path === "/") {
    location.replace("/");
    return;
  }
  var last = path.split("/").pop();
  if (last.indexOf(".") === -1) {
    location.replace(path + ".html");
    return;
  }
  location.replace("/");
})();
  </script>
  <meta http-equiv="refresh" content="3;url=/">
</head>
<body>
  <p>If you are not redirected, <a href="/">go to the home page</a>.</p>
</body>
</html>
